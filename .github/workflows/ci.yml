name: CI

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
        sourcemod-version: [master]
        metamod-version: [1.12-dev]
        include:
          - os: ubuntu-22.04
            target-archs: x86,x86_64
            sdks: sdk2013

    steps:
      - name: Install Linux packages
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -yq --no-install-recommends g++-multilib

      - name: Set up Python
        uses: actions/setup-python@v6

      - name: Checkout
        uses: actions/checkout@v7
        with:
          path: extension

      - name: Checkout SourceMod
        uses: actions/checkout@v7
        with:
          repository: alliedmodders/sourcemod
          ref: ${{ matrix.sourcemod-version }}
          path: sourcemod
          submodules: recursive

      - name: Checkout Metamod:Source
        uses: actions/checkout@v7
        with:
          repository: alliedmodders/metamod-source
          ref: ${{ matrix.metamod-version }}
          path: metamod-source
          submodules: recursive

      - name: Checkout AMBuild
        uses: actions/checkout@v7
        with:
          repository: alliedmodders/ambuild
          path: ambuild

      - name: Checkout sm-ext-common
        uses: actions/checkout@v7
        with:
          repository: srcdslab/sm-ext-common
          path: sourcemod/extensions/sm-ext-common

      - name: Install sourcemod dependencies
        run: |
          bash sourcemod/tools/checkout-deps.sh -m -s ${{ matrix.sdks }}

      - name: Install AMBuild
        run: pip install ./ambuild
      
      - name: Build
        working-directory: extension
        shell: bash
        env:
          BREAKPAD_SYMBOL_SERVER: ${{ secrets.BREAKPAD_SYMBOL_SERVER }}
        run: |
          mkdir build && cd build
          python ../configure.py --enable-optimize --targets=${{ matrix.target-archs }} --sdks=${{ matrix.sdks }}
          ambuild

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ runner.os }}
          path: extension/build/package


  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # download-artifact v5+ extracts a single artifact directly into path
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: Linux
          path: package

      - name: Package
        run: tar -czf ${{ github.event.repository.name }}-${{ github.ref_name }}-linux.tar.gz -C package .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.tar.gz'
          generate_release_notes: true
